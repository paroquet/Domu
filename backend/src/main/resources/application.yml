spring:
  datasource:
    url: jdbc:sqlite:${DATA_DIR:./data}/domu.db?busy_timeout=30000&journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-32-chars}
    access-expiration: 86400000
    refresh-expiration: 604800000
  upload:
    dir: ${DATA_DIR:./data}/uploads
  base-url: ${BASE_URL:http://localhost:8080}

server:
  port: 8080
