name: build-image

# 海外 GitHub runner 跨境 push 国内 TCR 会卡死（TCR personal 版跨境写入不可靠，
# 同 deepshape-stack 记录的 pull 端问题）。所以这里 runner 只负责 build，把镜像
# 导出成 tar 上传成 artifact；由本地（墙内）下载 → docker load → push TCR（同区快）
# → 触发 dokploy。跨境只发生在「下载 artifact」这一跳，可达性远好于直 push TCR。

on:
  push:
    branches: [main]
  workflow_dispatch:        # 允许在 Actions 页手动触发

concurrency:                # 同分支新 push 取消正在跑的旧 build
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ccr.ccs.tencentyun.com/o-pq/domu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # build 出镜像并存进本地 docker daemon（load: true），不 push 任何 registry。
      # 双 tag：:latest（dokploy 默认 pull）+ :sha-<短commit>（可追溯/回滚）。
      - name: Build image (load into daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          # 空前缀 → 走 docker.io 官方源（墙外 runner，比华为云 swr 快/稳）
          build-args: |
            IMAGE_PREFIX=
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      # 把两个 tag 一次性 save 进同一个 tar（docker save 支持多 tag 共享层）。
      - name: Export image to tar
        run: |
          docker save \
            "${IMAGE}:latest" \
            "${IMAGE}:sha-${GITHUB_SHA}" \
            -o domu-image.tar
          ls -lh domu-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: domu-image
          path: domu-image.tar
          retention-days: 7      # tar 较大，7 天后自动清理省空间

      - name: Print local deploy instructions
        run: |
          {
            echo "## ✅ 镜像已 build 完，导出为 artifact \`domu-image\`"
            echo ""
            echo "tags: \`${IMAGE}:latest\` + \`${IMAGE}:sha-${GITHUB_SHA}\`"
            echo ""
            echo "### 本地（墙内）部署步骤"
            echo ""
            echo '```bash'
            echo "# 1. 下载本次 build 的镜像 tar（需要 gh CLI 已登录）"
            echo "gh run download ${{ github.run_id }} -R ${{ github.repository }} -n domu-image"
            echo ""
            echo "# 2. load 进本地 docker"
            echo "docker load -i domu-image.tar"
            echo ""
            echo "# 3. push 到 TCR（本地墙内，同区快；需先 docker login ccr.ccs.tencentyun.com）"
            echo "docker push ${IMAGE}:latest"
            echo "docker push ${IMAGE}:sha-${GITHUB_SHA}"
            echo ""
            echo "# 4. 触发 dokploy 重新 pull :latest 并 redeploy"
            echo "#    DOKPLOY_DEPLOY_WEBHOOK = Dokploy UI → Domu → Deployments 里的 webhook URL"
            echo 'curl -fsS -X POST "$DOKPLOY_DEPLOY_WEBHOOK"'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
