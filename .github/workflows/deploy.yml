name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:        # 允许在 Actions 页手动触发

concurrency:                # 同分支新 push 取消正在跑的旧 build
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      # 生成 tags：:latest（dokploy 默认 pull）+ :sha-<短commit>（可追溯/回滚）
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ccr.ccs.tencentyun.com/o-pq/domu
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 空前缀 → 走 docker.io 官方源（墙外 runner，比华为云 swr 快/稳）
          build-args: |
            IMAGE_PREFIX=
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 用 GitHub Actions cache 缓存 BuildKit layer（npm ci / gradle deps），增量 build 提速
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Dokploy 现在还在本地（localhost control plane），墙外 runner 触发不到。
      # 所以这里只把「镜像已就绪 + 本地手动触发命令」打印到 Job Summary，
      # 你复制到本地终端跑，由本地 dokploy 重新 pull :latest 并 redeploy。
      # 等 dokploy 迁到云端有公网域名后，再把这步换成直接 curl webhook。
      - name: Print local deploy command
        run: |
          {
            echo "## ✅ 镜像已 push 到 TCR"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "### 本地触发 Dokploy 部署"
            echo "在本地终端跑（DOKPLOY_DEPLOY_WEBHOOK 换成 Dokploy UI → Domu → Deployments 里的 webhook URL）："
            echo ""
            echo '```bash'
            echo 'curl -fsS -X POST "$DOKPLOY_DEPLOY_WEBHOOK"'
            echo '```'
            echo ""
            echo "Dokploy 会重新 pull \`ccr.ccs.tencentyun.com/o-pq/domu:latest\` 并滚动 redeploy。"
          } >> "$GITHUB_STEP_SUMMARY"
