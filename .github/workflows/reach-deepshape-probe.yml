name: reach-deepshape-probe

# 临时验证：GitHub runner（海外）能否稳定访问 deepshape 服务器公网入口。
# 这是「GHA 回调 deepshape 上的 middle server」拓扑的前置条件 —— runner 连不到
# deepshape 公网，整个 registry+middle server 在 deepshape 的方案就不成立。
# 用 design.deepshape.cn 做探针（现成的 HTTPS 入口）。验证通过后删除本 workflow。

on:
  workflow_dispatch:

jobs:
  reach:
    runs-on: ubuntu-latest
    steps:
      - name: runner 地理位置（参考）
        run: |
          echo "runner 出口 IP / 区域："
          curl -s --max-time 10 https://ipinfo.io/json || echo "(ipinfo 不可达，跳过)"

      - name: 探测 design.deepshape.cn（10 次，看稳定性 + 延迟）
        run: |
          URL="https://design.deepshape.cn/"
          ok=0; fail=0; total_time=0
          echo "| # | HTTP | 连接(s) | TLS(s) | 总(s) |"
          echo "|---|------|---------|--------|-------|"
          for i in $(seq 1 10); do
            out=$(curl -s -o /dev/null \
              -w "%{http_code} %{time_connect} %{time_appconnect} %{time_total}" \
              --connect-timeout 15 --max-time 30 "$URL" 2>&1) || out="000 0 0 0"
            code=$(echo "$out" | awk '{print $1}')
            tconn=$(echo "$out" | awk '{print $2}')
            ttls=$(echo "$out" | awk '{print $3}')
            ttot=$(echo "$out" | awk '{print $4}')
            echo "| $i | $code | $tconn | $ttls | $ttot |"
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              ok=$((ok+1)); total_time=$(echo "$total_time + $ttot" | bc)
            else
              fail=$((fail+1))
            fi
          done
          echo ""
          echo "成功 $ok / 失败 $fail"
          if [ "$ok" -gt 0 ]; then
            echo "成功请求平均总耗时: $(echo "scale=3; $total_time / $ok" | bc)s"
          fi
          # 写 Summary
          {
            echo "## GitHub runner → deepshape 可达性"
            echo "- 成功 **$ok/10**，失败 $fail"
            if [ "$ok" -gt 0 ]; then
              echo "- 成功请求平均耗时 **$(echo "scale=3; $total_time / $ok" | bc)s**"
            fi
            if [ "$ok" -ge 8 ]; then
              echo "- ✅ 稳定可达，拓扑前置条件满足"
            elif [ "$ok" -ge 5 ]; then
              echo "- ⚠️ 时通时断，需评估是否可接受（可加重试）"
            else
              echo "- ❌ 基本不可达，拓扑不成立，需换方案"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # 不因单次失败 fail 整个 job，让统计完整呈现
          exit 0
